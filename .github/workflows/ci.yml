name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]" --break-system-packages

      - name: Run ruff check
        run: ruff check polyclaw

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]" --break-system-packages

      - name: Run mypy
        run: mypy polyclaw --no-error-summary 2>&1 | tee mypy_output.txt
        continue-on-error: true

      - name: Check mypy results
        run: |
          if grep -q "error:" mypy_output.txt; then
            echo "Type errors found:"
            cat mypy_output.txt
            exit 1
          fi
          echo "Type checking passed"

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]" --break-system-packages

      - name: Run pytest with coverage
        run: pytest --cov=polyclaw --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: .coverage
          retention-days: 7

  alembic-migrate:
    name: Alembic Migration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]" --break-system-packages

      - name: Run alembic upgrade (SQLite)
        run: |
          alembic upgrade head
          echo "Migration upgrade successful"

      - name: Verify downgrade works
        run: |
          alembic downgrade -1
          echo "Migration downgrade successful"

      - name: Re-run upgrade to leave DB in clean state
        run: alembic upgrade head

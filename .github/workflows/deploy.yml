name: Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: polyclaw
  ECS_CLUSTER: prod-polyclaw-cluster
  ECS_SERVICE: prod-polyclaw-api
  ECS_TASK_FAMILY: prod-polyclaw-api

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        run: |
          VERSION=staging-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
          ECS_TASK_FAMILY: ${{ env.ECS_TASK_FAMILY }}
        run: |
          # Get the current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY)
          TASK_DEF_ARN=$(echo $TASK_DEF | jq -r '.taskDefinition.taskDefinitionArn')

          # Create new task definition revision
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK=$(echo $NEW_TASK_DEF | jq 'del(.taskDefinitionArn)')
          NEW_REV=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.revision' --output text)
          echo "New task definition revision: $NEW_REV"

      - name: Deploy to ECS (staging)
        env:
          ECS_TASK_FAMILY: ${{ env.ECS_TASK_FAMILY }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          # Update the ECS service with the new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --force-new-deployment \
            --output json

          echo "Staging deployment initiated"

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

          echo "ECS deployment completed successfully"

  deploy-staging-services:
    name: Deploy Staging Services
    runs-on: ubuntu-latest
    needs: deploy-staging
    strategy:
      matrix:
        service: [ingestion, strategy-engine, execution, monitor]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging-services

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition for ${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ needs.deploy-staging.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.deploy-staging.outputs.image_tag }}
          ECS_TASK_FAMILY: staging-polyclaw-${{ matrix.service }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK=$(echo $NEW_TASK_DEF | jq 'del(.taskDefinitionArn)')
          NEW_REV=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.revision' --output text)
          echo "New task definition revision: $NEW_REV"

      - name: Deploy to ECS (staging-${{ matrix.service }})
        env:
          ECS_TASK_FAMILY: staging-polyclaw-${{ matrix.service }}
          ECS_SERVICE: staging-polyclaw-${{ matrix.service }}
        run: |
          aws ecs update-service \
            --cluster staging-polyclaw-cluster \
            --service $ECS_SERVICE \
            --task-definition $ECS_TASK_FAMILY \
            --force-new-deployment \
            --output json

          echo "Staging deployment of ${{ matrix.service }} initiated"

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster staging-polyclaw-cluster \
            --services staging-polyclaw-${{ matrix.service }}

          echo "ECS deployment of ${{ matrix.service }} completed successfully"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'release'
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-prod

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        run: |
          VERSION=prod-${{ github.ref_name }}-${{ github.sha :: 8 }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Pull staging image and push as production
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          # Pull the staging image and tag as production
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition (production)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
          ECS_TASK_FAMILY: prod-polyclaw-api
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK=$(echo $NEW_TASK_DEF | jq 'del(.taskDefinitionArn)')
          NEW_REV=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.revision' --output text)
          echo "New task definition revision: $NEW_REV"

      - name: Deploy to ECS (production)
        env:
          ECS_TASK_FAMILY: prod-polyclaw-api
          ECS_SERVICE: prod-polyclaw-api
        run: |
          aws ecs update-service \
            --cluster prod-polyclaw-cluster \
            --service prod-polyclaw-api \
            --task-definition prod-polyclaw-api \
            --force-new-deployment \
            --output json

          echo "Production deployment initiated"

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster prod-polyclaw-cluster \
            --services prod-polyclaw-api

          echo "ECS production deployment completed successfully"

  deploy-production-services:
    name: Deploy Production Services
    runs-on: ubuntu-latest
    needs: deploy-production
    strategy:
      matrix:
        service: [ingestion, strategy-engine, execution, monitor]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-prod-services

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition for ${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.deploy-production.outputs.image_tag }}
          ECS_TASK_FAMILY: prod-polyclaw-${{ matrix.service }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK=$(echo $NEW_TASK_DEF | jq 'del(.taskDefinitionArn)')
          NEW_REV=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.revision' --output text)
          echo "New task definition revision: $NEW_REV"

      - name: Deploy to ECS (prod-${{ matrix.service }})
        env:
          ECS_TASK_FAMILY: prod-polyclaw-${{ matrix.service }}
          ECS_SERVICE: prod-polyclaw-${{ matrix.service }}
        run: |
          aws ecs update-service \
            --cluster prod-polyclaw-cluster \
            --service $ECS_SERVICE \
            --task-definition $ECS_TASK_FAMILY \
            --force-new-deployment \
            --output json

          echo "Production deployment of ${{ matrix.service }} initiated"

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster prod-polyclaw-cluster \
            --services prod-polyclaw-${{ matrix.service }}

          echo "ECS production deployment of ${{ matrix.service }} completed successfully"

      - name: Notify deployment
        run: |
          echo "Production deployment of ${{ github.ref_name }} completed successfully"
